<script>
// ════════════════════════════════════════════════════
//  CONFIGURACIÓN — rellena con tus datos de Supabase
// ════════════════════════════════════════════════════
const SUPABASE_URL = 'https://elbvshufqehfkbgpgqov.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsYnZzaHVmcWVoZmtiZ3BncW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjg1ODIsImV4cCI6MjA5NDAwNDU4Mn0.WMaOy9Tk_w8MzXZNk0iU03ri0pypItaKo8XDvuwfUBI';
// ════════════════════════════════════════════════════

const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});

let currentUser=null, currentSection='resumen', nextId=1000, authMode='login', _sc=0;
const MES_ACTUAL=new Date().getMonth()+1, ANIO_ACTUAL=new Date().getFullYear();
const NOMBRES_MES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let propiedades=[];

// ── SYNC ──────────────────────────────────────────────
let _saveTimer=null;
function showToast(msg){const t=document.getElementById('sync-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

async function saveData(){
  try{localStorage.setItem('alq_data',JSON.stringify({propiedades,nextId}));}catch(e){}
  if(!currentUser)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    try{
      await _sb.from('alquileres').upsert({user_id:currentUser.id,data:JSON.stringify({propiedades,nextId}),updated_at:new Date().toISOString()},{onConflict:'user_id'});
      showToast('☁️ Guardado');
    }catch(e){}
  },800);
}

async function loadFromCloud(){
  if(!currentUser)return;
  try{
    const {data}=await _sb.from('alquileres').select('data').eq('user_id',currentUser.id).single();
    if(data&&data.data){
      const d=JSON.parse(data.data);
      if(d&&d.propiedades){propiedades=d.propiedades;nextId=d.nextId||nextId;}
      return;
    }
  }catch(e){}
  // Fallback a datos locales (migración desde versión anterior)
  try{
    const d=JSON.parse(localStorage.getItem('alq_data')||'null');
    if(d&&d.propiedades){propiedades=d.propiedades;nextId=d.nextId||nextId;saveData();}
  }catch(e){}
}

function checkResetMensual(){
  try{
    const claveMes=ANIO_ACTUAL+'-'+MES_ACTUAL;
    if(localStorage.getItem('alq_ultimo_reset')===claveMes)return;
    propiedades.forEach(p=>{
      try{
        if(p.tipo==='habitaciones'){(p.habitaciones||[]).forEach(h=>{if(h&&h.inquilino){h.cobrado=false;h.fechaCobro=null;}});}
        else{(p.ingresos||[]).forEach(ig=>{if(ig&&(ig.inquilino||ig.concepto==='Alquiler')){ig.cobrado=false;ig.fechaCobro=null;}});}
        (p.suministros||[]).forEach(s=>{if(s&&s.recurrente&&s.estado==='Pagado'){s.estado='Pendiente';s.fechaPago=null;}});
      }catch(e){}
    });
    localStorage.setItem('alq_ultimo_reset',claveMes);
    saveData();
  }catch(e){}
}

// ── AUTH ──────────────────────────────────────────────
function toggleAuthMode(){
  authMode=authMode==='login'?'register':'login';
  document.getElementById('auth-repeat-wrap').style.display=authMode==='register'?'block':'none';
  document.getElementById('auth-toggle-btn').textContent=authMode==='login'?'¿No tienes cuenta? Regístrate':'¿Ya tienes cuenta? Entrar';
  document.getElementById('auth-btn').textContent=authMode==='login'?'Entrar':'Registrarse';
  document.getElementById('auth-error').style.display='none';
}
function showAuthError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  if(!email||!pass){showAuthError('Rellena email y contraseña');return;}
  const btn=document.getElementById('auth-btn');
  btn.textContent='...';btn.disabled=true;
  document.getElementById('auth-error').style.display='none';
  try{
    if(authMode==='register'){
      const rep=document.getElementById('auth-repeat').value;
      if(pass!==rep){showAuthError('Las contraseñas no coinciden');btn.textContent='Registrarse';btn.disabled=false;return;}
      const {error}=await _sb.auth.signUp({email,password:pass});
      if(error)throw error;
      showAuthError('✅ Registro OK. Revisa tu email para confirmar y luego entra.');
      btn.textContent='Registrarse';btn.disabled=false;
    }else{
      const {error}=await _sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      // onAuthStateChange se encarga del resto
    }
  }catch(e){
    showAuthError(e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message||'Error al entrar');
    btn.textContent=authMode==='login'?'Entrar':'Registrarse';btn.disabled=false;
  }
}

async function doLogout(){
  await _sb.auth.signOut();
  currentUser=null;propiedades=[];
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── ARRANQUE CON LOGIN ────────────────────────────────
function mostrarLogin(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='none';
  const s=document.getElementById('auth-screen');
  s.style.display='flex';
  s.innerHTML=`
    <h1>🏠 Mis Alquileres</h1>
    <p>Entra para sincronizar en todos tus dispositivos</p>
    <div class="auth-form">
      <input id="auth-email" type="email" placeholder="Email" autocomplete="email"/>
      <input id="auth-pass" type="password" placeholder="Contraseña" autocomplete="current-password"/>
      <div id="auth-repeat-wrap" style="display:none;">
        <input id="auth-repeat" type="password" placeholder="Repetir contraseña"/>
      </div>
      <div class="auth-error" id="auth-error"></div>
      <button class="auth-btn" id="auth-btn" onclick="doAuth()">Entrar</button>
      <button class="auth-toggle" id="auth-toggle-btn" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate</button>
    </div>
  `;
}

function mostrarApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  navigate('resumen');
}

_sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_OUT'||event==='USER_DELETED'){
    currentUser=null;propiedades=[];mostrarLogin();return;
  }
  if(event==='TOKEN_REFRESHED'||event==='SIGNED_IN'){
    if(session&&session.user){
      currentUser=session.user;
      await loadFromCloud();
      checkResetMensual();
      mostrarApp();
    }else{
      currentUser=null;mostrarLogin();
    }
  }
});

(async function(){
  // Timeout de seguridad: si Supabase tarda más de 4s, mostrar login
  const timeout=new Promise(res=>setTimeout(()=>res('timeout'),4000));
  const authCheck=async()=>{
    try{
      const {data:sessionData,error}=await _sb.auth.getSession();
      if(error){await _sb.auth.signOut();return'login';}
      if(sessionData&&sessionData.session&&sessionData.session.user){
        const {data:userData,error:userError}=await _sb.auth.getUser();
        if(userError||!userData||!userData.user){await _sb.auth.signOut();return'login';}
        currentUser=userData.user;
        await loadFromCloud();
        checkResetMensual();
        return'app';
      }else{return'login';}
    }catch(e){
      try{await _sb.auth.signOut();}catch(e2){}
      return'login';
    }
  };
  const result=await Promise.race([authCheck(),timeout]);
  if(result==='app')mostrarApp();
  else mostrarLogin();
})();

// ── NAV ───────────────────────────────────────────────
function navigate(s){
  currentSection=s;
  ['resumen','propiedades','suministros','inquilinos'].forEach((sec,i)=>{
    document.querySelectorAll('.nav-item')[i]&&document.querySelectorAll('.nav-item')[i].classList.toggle('active',sec===s);
  });
  const titles={resumen:'📊 Resumen',propiedades:'🏘️ Propiedades',suministros:'💡 Suministros',inquilinos:'👥 Inquilinos',detalle:'🏠 Propiedad'};
  document.getElementById('top-title').textContent=titles[s]||s;
  document.getElementById('fab-btn').style.display=(s==='propiedades')?'flex':'none';
  renderSection(s);
}
function renderSection(s){
  const c=document.getElementById('main-content');
  if(s==='resumen')renderResumen(c);
  else if(s==='propiedades')renderPropiedades(c);
  else if(s==='suministros')renderSuministrosGlobal(c);
  else if(s==='inquilinos')renderInquilinos(c);
  else if(s==='detalle')renderDetalle(c);
}

function fmt(n){return Math.round(n||0).toLocaleString('es-ES');}
function fmtDec(n){return(Math.round((n||0)*100)/100).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});}

// ── CALCS ─────────────────────────────────────────────
function importeConIPC(importeBase,fechaEntrada){
  if(!fechaEntrada||!importeBase)return importeBase||0;
  const entrada=new Date(fechaEntrada),hoy=new Date();
  let aniversarios=hoy.getFullYear()-entrada.getFullYear();
  if(hoy.getMonth()<entrada.getMonth())aniversarios--;
  if(aniversarios<=0)return importeBase;
  return Math.round(importeBase*Math.pow(1.02,aniversarios));
}
function calcProp(p){
  let ingresos=0;
  if(p.tipo==='habitaciones')p.habitaciones.forEach(h=>{if(h.inquilino)ingresos+=importeConIPC(h.alquiler,h.entrada);});
  else(p.ingresos||[]).forEach(i=>ingresos+=importeConIPC(i.importe,i.entrada));
  let gastosFijos=0;(p.gastos||[]).forEach(g=>gastosFijos+=(g.importe||0));
  let sumProp=0;(p.suministros||[]).filter(s=>s.pagador==='Propietario').forEach(s=>sumProp+=(s.importe||0));
  const totalGastos=gastosFijos+sumProp,neto=ingresos-totalGastos,numSocios=(p.socios||[]).length+1;
  return{ingresos,gastosFijos,sumProp,totalGastos,neto,netoMio:neto/numSocios,numSocios};
}
function estadoRapido(p){
  const items=[];
  if(p.tipo==='habitaciones'){
    p.habitaciones.filter(h=>h.inquilino).forEach(h=>{
      items.push({label:h.inquilino.split(' ')[0]+' '+fmt(importeConIPC(h.alquiler,h.entrada))+'€',ok:h.cobrado,fechaCobro:h.fechaCobro||null});
    });
  }else{
    (p.ingresos||[]).forEach(ig=>{
      items.push({label:ig.inquilino?ig.inquilino.split(' ')[0]+' '+fmt(importeConIPC(ig.importe,ig.entrada))+'€':'Alquiler '+fmt(importeConIPC(ig.importe,ig.entrada))+'€',ok:ig.cobrado,fechaCobro:ig.fechaCobro||null});
    });
  }
  return{cobros:items,pendSum:(p.suministros||[]).filter(s=>s.estado==='Pendiente')};
}

// ── ALERTAS ───────────────────────────────────────────
function getAlertas(){
  const alertas=[],hoy=new Date();
  propiedades.forEach(p=>{
    // IPC
    if(p.tipo==='habitaciones'){
      p.habitaciones.filter(h=>h.inquilino&&h.entrada).forEach(h=>{
        const entrada=new Date(h.entrada);
        let aniv=new Date(entrada);aniv.setFullYear(hoy.getFullYear());
        if(aniv<hoy)aniv.setFullYear(hoy.getFullYear()+1);
        const dias=Math.ceil((aniv-hoy)/(1000*60*60*24));
        if(dias<=30)alertas.push({tipo:'ipc',prop:p.nombre,inquilino:h.inquilino,dias,anios:aniv.getFullYear()-entrada.getFullYear(),propId:p.id,habId:h.id,alquiler:h.alquiler});
      });
    }else{
      (p.ingresos||[]).forEach(ig=>{
        const fechaRef=ig.entrada||ig.fechaCobro;if(!fechaRef)return;
        const entrada=new Date(fechaRef);
        let aniv=new Date(entrada);aniv.setFullYear(hoy.getFullYear());
        if(aniv<hoy)aniv.setFullYear(hoy.getFullYear()+1);
        const dias=Math.ceil((aniv-hoy)/(1000*60*60*24));
        if(dias<=30)alertas.push({tipo:'ipc',prop:p.nombre,inquilino:ig.inquilino||'Inquilino',dias,anios:aniv.getFullYear()-entrada.getFullYear(),propId:p.id,igId:ig.id,alquiler:ig.importe});
      });
    }
    // Suministros pendientes
    (p.suministros||[]).filter(s=>s.estado==='Pendiente').forEach(s=>{
      alertas.push({tipo:'suministro',prop:p.nombre,suministro:s.tipo,importe:s.importe,propId:p.id,sId:s.id,pagador:s.pagador});
    });
    // Cobros pendientes
    if(p.tipo==='habitaciones'){
      p.habitaciones.filter(h=>h.inquilino&&!h.cobrado).forEach(h=>{
        alertas.push({tipo:'cobro',prop:p.nombre,inquilino:h.inquilino,importe:h.alquiler,propId:p.id,habId:h.id});
      });
    }else{
      (p.ingresos||[]).filter(ig=>!ig.cobrado&&ig.importe>0).forEach(ig=>{
        alertas.push({tipo:'cobro',prop:p.nombre,inquilino:ig.inquilino||'Alquiler',importe:ig.importe,propId:p.id,igId:ig.id});
      });
    }
  });
  return alertas;
}

// ── RESUMEN ───────────────────────────────────────────

      <div class="stat-box"><div class="stat-label">Neto</div><div class="stat-val ${tN>=0?'green':'red'}">${fmt(tN)}€</div></div>
    </div>
    ${alertasHTML?alertasHTML+'<hr class="divider"/>':''}
    <div class="sec-title">Por propiedad — ${mesNombre} ${ANIO_ACTUAL}</div>
    ${!propiedades.length?`<div class="card" style="text-align:center;padding:1.5rem;">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;">🏘️</div>
      <div style="font-weight:600;margin-bottom:0.3rem;">Sin propiedades</div>
      <div style="font-size:0.82rem;color:#888;margin-bottom:1rem;">Añade tu primera propiedad para empezar</div>
      <button class="btn btn-primary" onclick="navigate('propiedades');setTimeout(()=>openFab(),100)">+ Añadir propiedad</button>
    </div>`:propiedades.map(p=>{
      const ca=calcProp(p),tiSoc=p.socios&&p.socios.length>0;
      const er=estadoRapido(p);
      const cobrosHTML=er.cobros.filter(co=>!co.ok).map(co=>`<span class="estado-pill pill-pend">⏳ ${co.label}</span>`).join('');
      const cobradosHTML=er.cobros.filter(co=>co.ok).map(co=>{const f=co.fechaCobro?' · día '+co.fechaCobro.slice(8,10):'';return`<span class="estado-pill pill-ok">✓ ${co.label}${f}</span>`;}).join('');
      const sumHTML=(p.suministros||[]).map(s=>{

      </div>`;
    }).join('')}`;
}

function toggleSumResumen(propId,sId,e){
  e.stopPropagation();
  const p=propiedades.find(x=>x.id===propId),s=(p.suministros||[]).find(x=>x.id===sId);
  if(!s)return;
  s.estado='Pagado';s.fechaPago=new Date().toISOString().slice(0,10);
  saveData();
  const pill=document.getElementById('sp-'+propId+'-'+sId);
  if(pill){pill.className='estado-pill pill-ok';pill.style.cursor='default';pill.onclick=null;pill.textContent='✓ '+s.tipo+' día '+s.fechaPago.slice(8,10);}
  const alertBox=document.getElementById('sum-alert-'+propId+'-'+sId);
  if(alertBox){
    alertBox.style.borderLeftColor='#10b981';alertBox.style.background='#d1fae5';
    alertBox.querySelector('.alert-title').textContent='✅ Pagado — '+s.tipo+' ('+p.nombre+')';
    const btn=alertBox.querySelector('button');if(btn){btn.textContent='✓ Pagado';btn.disabled=true;}
    setTimeout(()=>renderSection(currentSection),900);
  }
}
function marcarCobroPendiente(propId,habId,igId){
  const p=propiedades.find(x=>x.id===propId);
  const hoy=new Date().toISOString().slice(0,10);
  if(habId){const h=p.habitaciones.find(x=>x.id===habId);if(h){h.cobrado=true;h.fechaCobro=hoy;}}
  else if(igId){const ig=(p.ingresos||[]).find(x=>x.id===igId);if(ig){ig.cobrado=true;ig.fechaCobro=hoy;}}
  renderSection(currentSection);saveData();
}
function marcarSumPagadoAlerta(propId,sId,btn){
  const p=propiedades.find(x=>x.id===propId),s=(p.suministros||[]).find(x=>x.id===sId);
  if(!s)return;
  const box=document.getElementById('sum-alert-'+propId+'-'+sId);
  if(box){
    box.style.borderLeftColor='#10b981';box.style.background='#d1fae5';
    box.querySelector('.alert-title').textContent='✅ Pagado — '+s.tipo+' ('+p.nombre+')';
    btn.textContent='✓ Pagado';btn.style.background='#065f46';btn.style.color='#fff';btn.disabled=true;
  }
  const pill=document.getElementById('sp-'+propId+'-'+sId);
  if(pill){pill.className='estado-pill pill-ok';pill.style.cursor='default';pill.onclick=null;pill.textContent='✓ '+s.tipo+' día '+new Date().getDate();}
  s.estado='Pagado';s.fechaPago=new Date().toISOString().slice(0,10);
  saveData();
  setTimeout(()=>renderSection(currentSection),900);
}
function toggleSumDetalle(propId,sId){
  const p=propiedades.find(x=>x.id===propId),s=(p.suministros||[]).find(x=>x.id===sId);
  if(s){s.estado=s.estado==='Pagado'?'Pendiente':'Pagado';s.fechaPago=s.estado==='Pagado'?new Date().toISOString().slice(0,10):null;}
  window._dTab='suministros';renderDetalle(document.getElementById('main-content'));saveData();
}

  document.getElementById('top-title').textContent='🏠 Propiedad';

}

  const p=propiedades.find(x=>x.id===window._dPropId);
  if(!p){navigate('propiedades');return;}
  const ca=calcProp(p),tab=window._dTab||'resumen',hoy=new Date();
  let inqList=[];
  if(p.tipo==='habitaciones')inqList=p.habitaciones.filter(h=>h.inquilino).map(h=>({...h,alquilerBase:h.alquiler,alquiler:importeConIPC(h.alquiler,h.entrada),hab:'Hab.'+h.num}));
  else inqList=(p.ingresos||[]).filter(ig=>ig.inquilino).map(ig=>({inquilino:ig.inquilino,telefono:ig.telefono||'',email:ig.email||'',alquiler:importeConIPC(ig.importe,ig.entrada),alquilerBase:ig.importe,entrada:ig.entrada||ig.fechaCobro||'',finContrato:ig.finContrato||'',cobrado:ig.cobrado,hab:'Completo',id:ig.id}));

  function ipcHTML(nombre,alquiler,entrada){
    if(!entrada||!alquiler)return'';
    const fechaEntrada=new Date(entrada);
    const mesEntrada=fechaEntrada.getMonth();
    const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const mesNombre=MESES[mesEntrada];

function subirContrato(propId,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const p=propiedades.find(x=>x.id===propId);p.contratoPDF={nombre:file.name,data:e.target.result,fecha:new Date().toLocaleDateString('es-ES')};saveData();renderDetalle(document.getElementById('main-content'));};
  reader.readAsDataURL(file);
}
function borrarContrato(propId){
  if(!confirm('¿Eliminar contrato?'))return;
  const p=propiedades.find(x=>x.id===propId);delete p.contratoPDF;saveData();renderDetalle(document.getElementById('main-content'));
}

  c.innerHTML=propiedades.map(p=>{
    const ca=calcProp(p),habOc=p.tipo==='habitaciones'?p.habitaciones.filter(h=>h.inquilino).length:0,tiSoc=p.socios&&p.socios.length>0;
    const er=estadoRapido(p);
    const cobrosHTML=er.cobros.map(co=>`<span class="estado-pill ${co.ok?'pill-ok':'pill-pend'}">${co.ok?'✓':'⏳'} ${co.label}</span>`).join('');

          <span class="badge badge-${p.estado==='ocupado'?'green':p.estado==='libre'?'orange':'gray'}">${p.estado==='ocupado'?'Ocupado':p.estado==='libre'?'Libre':'Reforma'}</span>
          ${tiSoc?`<span class="badge badge-purple">÷${ca.numSocios}</span>`:''}
        </div>
      </div>
      <div class="dr"><span class="lbl">Ingresos</span><span class="val" style="color:#1e40af;">${fmt(ca.ingresos)}€/mes</span></div>
      <div class="dr"><span class="lbl">Gastos</span><span class="val" style="color:#991b1b;">${fmt(ca.totalGastos)}€/mes</span></div>
      <div class="dr"><span class="lbl">${tiSoc?'Tu parte neta':'Neto'}</span><span class="val" style="color:${ca.netoMio>=0?'#065f46':'#991b1b'};">${fmt(ca.netoMio)}€/mes</span></div>
      ${(cobrosHTML||sumHTML)?`<div class="estado-row">${cobrosHTML}${sumHTML}</div>`:''}
      <hr class="divider"/>
      <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">

        <button class="btn btn-secondary btn-sm" onclick="verGastos(${p.id})">💸 Gastos</button>
        <button class="btn btn-secondary btn-sm" onclick="verSuministrosProp(${p.id})">💡 Suministros</button>
        <button class="btn btn-secondary btn-sm" onclick="editarPropiedad(${p.id})">✏️ Editar</button>

function openFab(){abrirModalProp(null);}
function editarPropiedad(id){abrirModalProp(id);}
function socioRowHTML(nombre,i){return`<div class="socio-row" id="sr-${i}"><span>👤</span><input class="socio-input" type="text" value="${nombre}" id="si-${i}" placeholder="Nombre del socio"/><button onclick="rmSocio(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:1rem;">✕</button></div>`;}
function rmSocio(i){const r=document.getElementById('sr-'+i);if(r)r.remove();}
function addSocioRow(){_sc++;const l=document.getElementById('socios-list');const d=document.createElement('div');d.innerHTML=socioRowHTML('',_sc);l.appendChild(d.firstChild);document.getElementById('si-'+_sc).focus();}

function abrirModalProp(propId){
  _sc=0;
  const p=propId?propiedades.find(x=>x.id===propId):null;
  const socios=p?(p.socios||[]):[];
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>

    </div>
    <div class="field"><label>Dirección</label><input id="m-dir" value="${p?p.direccion:''}" placeholder="Calle y número..."/></div>
    <div class="field" id="m-alq-wrap" style="display:${p&&p.tipo==='habitaciones'?'none':'block'}">
      <label>Alquiler mensual (€)</label><input id="m-alq" type="number" value="${p&&p.ingresos&&p.ingresos[0]?p.ingresos[0].importe:''}" placeholder="0"/>
    </div>
    <div class="field"><label>Estado</label><select id="m-estado">
      <option value="ocupado" ${p&&p.estado==='ocupado'?'selected':''}>Ocupado</option>
      <option value="libre" ${p&&p.estado==='libre'?'selected':''}>Libre</option>
      <option value="reforma" ${p&&p.estado==='reforma'?'selected':''}>En reforma</option>
    </select></div>
    <hr class="divider"/>
    <div style="font-size:0.88rem;font-weight:700;margin-bottom:0.4rem;">👥 Socios (opcional)</div>
    <div id="socios-list">${socios.map((s,i)=>{_sc=i;return socioRowHTML(s,i);}).join('')}</div>
    <button class="add-socio-btn" onclick="addSocioRow()">+ Añadir socio</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProp(${propId||'null'})">${p?'Guardar cambios':'Crear propiedad'}</button>
    </div>
  `);

function onTipoChange(){
  const t=document.getElementById('m-tipo').value;
  document.getElementById('m-numhab-wrap').style.display=t==='habitaciones'?'block':'none';
  document.getElementById('m-alq-wrap').style.display=t==='habitaciones'?'none':'block';
}
function guardarProp(propId){
  const nombre=document.getElementById('m-nombre').value.trim();
  if(!nombre){alert('El nombre es obligatorio');return;}
  const tipo=document.getElementById('m-tipo').value,dir=document.getElementById('m-dir').value.trim(),estado=document.getElementById('m-estado').value;
  const numHab=tipo==='habitaciones'?parseInt(document.getElementById('m-numhab').value)||1:0;
  const alq=tipo==='completo'?parseFloat(document.getElementById('m-alq').value)||0:0;
  const socios=[];
  document.querySelectorAll('#socios-list .socio-row').forEach(row=>{const inp=row.querySelector('input');if(inp&&inp.value.trim())socios.push(inp.value.trim());});
  if(propId){
    const p=propiedades.find(x=>x.id===propId);if(!p)return;
    p.nombre=nombre;p.tipo=tipo;p.direccion=dir;p.estado=estado;p.socios=socios;
    if(tipo==='habitaciones'){
      p.numHabitaciones=numHab;
      while(p.habitaciones.length<numHab)p.habitaciones.push({id:nextId++,num:p.habitaciones.length+1,inquilino:'',telefono:'',email:'',alquiler:0,entrada:'',finContrato:'',fianza:0,notas:'',cobrado:false});
      if(p.habitaciones.length>numHab)p.habitaciones=p.habitaciones.slice(0,numHab);
    }
    if(tipo==='completo'&&alq){
      if(!p.ingresos||!p.ingresos.length)p.ingresos=[{id:nextId++,concepto:'Alquiler',importe:alq,mes:MES_ACTUAL,anio:ANIO_ACTUAL,cobrado:false,inquilino:'',finContrato:'',entrada:''}];
      else p.ingresos[0].importe=alq;
    }
  }else{
    const np={id:nextId++,nombre,tipo,direccion:dir,estado,numHabitaciones:numHab,socios,habitaciones:[],gastos:[],ingresos:[],suministros:[]};
    if(tipo==='habitaciones')for(let i=0;i<numHab;i++)np.habitaciones.push({id:nextId++,num:i+1,inquilino:'',telefono:'',email:'',alquiler:0,entrada:'',finContrato:'',fianza:0,notas:'',cobrado:false});
    else if(alq)np.ingresos.push({id:nextId++,concepto:'Alquiler',importe:alq,mes:MES_ACTUAL,anio:ANIO_ACTUAL,cobrado:false,inquilino:'',finContrato:'',entrada:''});
    propiedades.push(np);
  }
  closeModal();renderSection(currentSection);saveData();
}
function borrarPropiedad(id){if(!confirm('¿Borrar esta propiedad?'))return;propiedades=propiedades.filter(p=>p.id!==id);renderSection(currentSection);saveData();}

// ── HABITACIONES ──────────────────────────────────────

  const ca=calcProp(p),tiSoc=p.socios&&p.socios.length>0;
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">🛏️ ${p.nombre}</div>
    <div class="stats3" style="margin-bottom:0.8rem;">
      <div class="stat-box"><div class="stat-label">Ingresos</div><div class="stat-val blue">${fmt(ca.ingresos)}€</div></div>

      <div class="stat-box"><div class="stat-label">${tiSoc?'Tu parte':'Neto'}</div><div class="stat-val ${ca.netoMio>=0?'green':'red'}">${fmt(ca.netoMio)}€</div></div>
    </div>
    ${tiSoc?`<div class="info-box">Socios: ${p.socios.join(', ')} · Tu parte: ${fmt(ca.netoMio)}€/mes</div>`:''}

          <div class="hab-num">Habitación ${h.num}</div>

          <div class="hab-rent">${h.inquilino?fmt(h.alquiler)+'€/mes':'—'}</div>
          ${h.inquilino?`<div style="font-size:0.68rem;margin-top:0.2rem;"><span style="background:${h.cobrado?'#d1fae5':'#ffedd5'};color:${h.cobrado?'#065f46':'#9a3412'};padding:0.1rem 0.4rem;border-radius:8px;font-weight:600;">${h.cobrado?'✓ Cobrado':'⏳ Pendiente'}</span></div>`:''}

  `);
}
function editarHab(propId,habId){
  const p=propiedades.find(x=>x.id===propId),h=p.habitaciones.find(x=>x.id===habId);
  showModal(`
    <button class="modal-close" onclick="verHabitaciones(${propId})">✕</button>
    <div class="modal-title">Habitación ${h.num} — ${p.nombre}</div>
    <div class="field"><label>Inquilino</label><input id="h-inq" value="${h.inquilino}" placeholder="Nombre (vacío = libre)"/></div>
    <div class="field-row">
      <div class="field"><label>Teléfono</label><input id="h-tel" value="${h.telefono}"/></div>
      <div class="field"><label>Email</label><input id="h-email" type="email" value="${h.email}"/></div>
    </div>
    <div class="field"><label>Alquiler (€/mes)</label><input id="h-alq" type="number" value="${h.alquiler}"/></div>
    <div class="field-row">
      <div class="field"><label>Fecha entrada</label><input id="h-entrada" type="date" value="${h.entrada}"/></div>
      <div class="field"><label>Fin contrato</label><input id="h-fin" type="date" value="${h.finContrato}"/></div>
    </div>
    <div class="field"><label>Fianza (€)</label><input id="h-fianza" type="number" value="${h.fianza}"/></div>
    <div class="field" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
      <input id="h-cobrado" type="checkbox" style="width:auto;margin:0;" ${h.cobrado?'checked':''}/>
      <label for="h-cobrado" style="margin:0;font-size:0.85rem;">Alquiler cobrado este mes</label>
    </div>
    <div class="field"><label>Notas</label><textarea id="h-notas" rows="2">${h.notas}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="verHabitaciones(${propId})">← Volver</button>
      <button class="btn btn-primary" onclick="guardarHab(${propId},${habId})">Guardar</button>
    </div>
  `);
}
function guardarHab(propId,habId){
  const p=propiedades.find(x=>x.id===propId),h=p.habitaciones.find(x=>x.id===habId);
  h.inquilino=document.getElementById('h-inq').value.trim();
  h.telefono=document.getElementById('h-tel').value.trim();
  h.email=document.getElementById('h-email').value.trim();
  h.alquiler=parseFloat(document.getElementById('h-alq').value)||0;
  h.entrada=document.getElementById('h-entrada').value;
  h.finContrato=document.getElementById('h-fin').value;
  h.fianza=parseFloat(document.getElementById('h-fianza').value)||0;
  const cobradoAntes=h.cobrado;
  h.cobrado=document.getElementById('h-cobrado').checked;
  if(h.cobrado&&!cobradoAntes)h.fechaCobro=new Date().toISOString().slice(0,10);
  else if(!h.cobrado)h.fechaCobro=null;
  h.notas=document.getElementById('h-notas').value;
  saveData();verHabitaciones(propId);
}

// ── INGRESOS ──────────────────────────────────────────
function verIngresos(propId){
  const p=propiedades.find(x=>x.id===propId);
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">💰 Ingresos — ${p.nombre}</div>
    ${!(p.ingresos&&p.ingresos.length)?'<p style="color:#aaa;text-align:center;padding:1rem 0;">Sin ingresos</p>':''}
    ${(p.ingresos||[]).map(ig=>`
      <div class="list-item">
        <div>

    <div class="field"><label>Descripción</label><input id="ig-txt" value="Alquiler"/></div>
    <div class="field"><label>Inquilino</label><input id="ig-inq" placeholder="Nombre del inquilino"/></div>

    <div class="field" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
      <input id="ig-cobrado" type="checkbox" style="width:auto;margin:0;"/>
      <label for="ig-cobrado" style="margin:0;font-size:0.85rem;">Cobrado</label>

      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="guardarIngreso(${propId})">Añadir</button>

}
function toggleCobro(propId,habId,igId){
  const p=propiedades.find(x=>x.id===propId);
  const hoy=new Date().toISOString().slice(0,10);
  if(habId){const h=p.habitaciones.find(x=>x.id===habId);if(h){h.cobrado=!h.cobrado;h.fechaCobro=h.cobrado?hoy:null;}}
  else if(igId){const ig=(p.ingresos||[]).find(x=>x.id===igId);if(ig){ig.cobrado=!ig.cobrado;ig.fechaCobro=ig.cobrado?hoy:null;}}
  saveData();
  if(currentSection==='detalle'){window._dTab='inquilinos';renderDetalle(document.getElementById('main-content'));}
  else verIngresos(propId);
}
function editarIngreso(propId,igId){
  const p=propiedades.find(x=>x.id===propId);
  const ig=(p.ingresos||[]).find(x=>x.id===igId);if(!ig)return;
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="field"><label>Email</label><input id="ei-email" type="email" value="${ig.email||''}"/></div>
    <div class="field"><label>Importe (€/mes)</label><input id="ei-imp" type="number" value="${ig.importe||''}"/></div>
    <div class="field-row">
      <div class="field"><label>Fecha entrada</label><input id="ei-entrada" type="date" value="${ig.entrada||''}"/></div>
      <div class="field"><label>Fin contrato</label><input id="ei-fin" type="date" value="${ig.finContrato||''}"/></div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
      <input id="ei-cobrado" type="checkbox" style="width:auto;margin:0;" ${ig.cobrado?'checked':''}/>
      <label for="ei-cobrado" style="margin:0;font-size:0.85rem;">Cobrado este mes</label>
    </div>

      <button class="btn btn-primary" onclick="guardarEdicionIngreso(${propId},${igId})">Guardar</button>
    </div>
  `);
}
function guardarEdicionIngreso(propId,igId){
  const p=propiedades.find(x=>x.id===propId);
  const ig=(p.ingresos||[]).find(x=>x.id===igId);if(!ig)return;
  ig.concepto=document.getElementById('ei-txt').value.trim();
  ig.inquilino=document.getElementById('ei-inq').value.trim();
  ig.telefono=document.getElementById('ei-tel').value.trim();
  ig.email=document.getElementById('ei-email').value.trim();
  ig.importe=parseFloat(document.getElementById('ei-imp').value)||0;
  ig.entrada=document.getElementById('ei-entrada').value;
  ig.finContrato=document.getElementById('ei-fin').value;
  ig.cobrado=document.getElementById('ei-cobrado').checked;
  saveData();closeModal();
  if(currentSection==='detalle'){window._dTab='inquilinos';renderDetalle(document.getElementById('main-content'));}
}
function guardarIngreso(propId){
  const p=propiedades.find(x=>x.id===propId),imp=parseFloat(document.getElementById('ig-imp').value)||0;
  if(!imp){alert('Importe obligatorio');return;}
  p.ingresos=p.ingresos||[];
  p.ingresos.push({id:nextId++,concepto:document.getElementById('ig-txt').value.trim()||'Alquiler',importe:imp,mes:parseInt(document.getElementById('ig-mes').value)||1,anio:ANIO_ACTUAL,cobrado:document.getElementById('ig-cobrado').checked,inquilino:document.getElementById('ig-inq').value.trim(),entrada:document.getElementById('ig-entrada').value,finContrato:document.getElementById('ig-fin').value,fechaCobro:''});
  saveData();verIngresos(propId);
}
function borrarIngreso(propId,igId){const p=propiedades.find(x=>x.id===propId);p.ingresos=p.ingresos.filter(i=>i.id!==igId);saveData();verIngresos(propId);}

// ── GASTOS ────────────────────────────────────────────
function verGastos(propId){
  const p=propiedades.find(x=>x.id===propId),total=(p.gastos||[]).reduce((a,g)=>a+g.importe,0);
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">💸 Gastos — ${p.nombre}</div>
    <div style="background:#f0fdf4;border-radius:8px;padding:0.55rem 0.75rem;font-size:0.76rem;color:#065f46;margin-bottom:0.8rem;">💡 IBI y Seguro: introduce el importe anual y se calcula ÷12 automáticamente.</div>
    ${total>0?`<div style="font-size:0.8rem;color:#888;margin-bottom:0.7rem;">Total mes: <strong style="color:#991b1b;">${fmt(total)}€</strong></div>`:''}
    ${!(p.gastos&&p.gastos.length)?'<p style="color:#aaa;text-align:center;padding:1rem 0;">Sin gastos</p>':''}
    ${(p.gastos||[]).map(g=>`
      <div class="list-item">
        <div>
          <div class="li-title">${g.concepto}</div>
          <div class="li-sub">${g.categoria}${g.tipoAnual?' · Anual ÷12 = '+fmt(g.importe)+'€/mes':' · '+fmt(g.importe)+'€'}${g.recurrente?' · Recurrente':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          ${g.tipoAnual?`<span class="badge badge-blue">${fmt(g.importeAnual||g.importe*12)}€/año</span>`:''}
          <span style="font-weight:700;color:#991b1b;">${fmt(g.importe)}€/mes</span>
          <button onclick="borrarGasto(${propId},${g.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;">✕</button>
        </div>
      </div>
    `).join('')}
    <hr class="divider"/>
    <div style="font-size:0.85rem;font-weight:700;margin-bottom:0.7rem;">Añadir gasto</div>
    <div class="field"><label>Categoría</label><select id="g-cat" onchange="onCatChange()">
      <option value="Comunidad">Comunidad</option><option value="Hipoteca">Hipoteca</option>
      <option value="IBI">IBI (anual ÷12)</option><option value="Seguro">Seguro (anual ÷12)</option>
      <option value="Avería">Avería</option><option value="Mantenimiento">Mantenimiento</option>
      <option value="Gestión">Gestión</option><option value="Otro">Otro</option>
    </select></div>
    <div class="field" id="g-anual-wrap" style="display:none;">
      <label id="g-anual-label">Importe anual total (€)</label>
      <input id="g-anual" type="number" placeholder="Ej: 660" oninput="calcMensual()"/>
      <div style="font-size:0.75rem;color:#888;margin-top:0.3rem;">= <span id="g-mensual-preview">0</span>€/mes</div>
    </div>
    <div class="field" id="g-mensual-wrap">
      <label id="g-mensual-label">Importe mensual (€)</label>
      <input id="g-imp" type="number" placeholder="0"/>
    </div>
    <div class="field"><label>Concepto *</label><input id="g-con" placeholder="Descripción..."/></div>
    <div class="field-row">
      <div class="field"><label>Mes</label><input id="g-mes" type="number" min="1" max="12" value="${MES_ACTUAL}"/></div>
      <div class="field" style="display:flex;align-items:flex-end;padding-bottom:0.2rem;">
        <label style="display:flex;align-items:center;gap:0.5rem;margin:0;font-size:0.85rem;"><input id="g-rec" type="checkbox" style="width:auto;margin:0;"/> Recurrente</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="guardarGasto(${propId})">Añadir gasto</button>
    </div>
  `);
}
function onCatChange(){
  const cat=document.getElementById('g-cat').value,esAnual=cat==='IBI'||cat==='Seguro';
  document.getElementById('g-anual-wrap').style.display=esAnual?'block':'none';
  document.getElementById('g-mensual-wrap').style.display=esAnual?'none':'block';
  if(esAnual)document.getElementById('g-anual-label').textContent=cat+' — importe anual total (€)';
}
function calcMensual(){document.getElementById('g-mensual-preview').textContent=fmtDec((parseFloat(document.getElementById('g-anual').value)||0)/12);}
function guardarGasto(propId){
  const p=propiedades.find(x=>x.id===propId);
  const cat=document.getElementById('g-cat').value,con=document.getElementById('g-con').value.trim();
  const esAnual=cat==='IBI'||cat==='Seguro';
  const importeAnual=esAnual?parseFloat(document.getElementById('g-anual').value)||0:0;
  const importe=esAnual?importeAnual/12:parseFloat(document.getElementById('g-imp').value)||0;
  if(!con||!importe){alert('Concepto e importe son obligatorios');return;}
  p.gastos=p.gastos||[];
  p.gastos.push({id:nextId++,categoria:cat,concepto:con,importe,importeAnual:esAnual?importeAnual:null,tipoAnual:esAnual,mes:parseInt(document.getElementById('g-mes').value)||1,anio:ANIO_ACTUAL,recurrente:document.getElementById('g-rec').checked});
  saveData();verGastos(propId);
}
function borrarGasto(propId,gId){const p=propiedades.find(x=>x.id===propId);p.gastos=p.gastos.filter(g=>g.id!==gId);saveData();verGastos(propId);}

// ── SUMINISTROS ───────────────────────────────────────
function verSuministrosProp(propId){
  const p=propiedades.find(x=>x.id===propId),totalProp=(p.suministros||[]).filter(s=>s.pagador==='Propietario').reduce((a,s)=>a+s.importe,0);
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">💡 Suministros — ${p.nombre}</div>
    ${p.tipo==='habitaciones'?`<div class="info-box">Los suministros de viviendas por habitaciones son de la propiedad entera.</div>`:''}
    ${totalProp>0?`<div style="font-size:0.8rem;color:#888;margin-bottom:0.7rem;">Total propietario: <strong style="color:#991b1b;">${fmt(totalProp)}€</strong></div>`:''}
    ${!(p.suministros&&p.suministros.length)?'<p style="color:#aaa;text-align:center;padding:1rem 0;">Sin suministros</p>':''}
    ${(p.suministros||[]).map(s=>`
      <div class="list-item">
        <div><div class="li-title">${s.tipo}</div><div class="li-sub">${s.periodo||''} · ${s.pagador}${s.fechaPago?' · pagado el '+s.fechaPago.slice(8,10):''}</div></div>
        <div style="display:flex;align-items:center;gap:0.4rem;">
          <span class="badge badge-${s.estado==='Pagado'?'green':'orange'}">${s.estado}</span>
          <span style="font-weight:700;">${fmt(s.importe)}€</span>
          <button onclick="toggleSumEstado(${propId},${s.id})" style="background:none;border:none;cursor:pointer;font-size:1rem;">${s.estado==='Pagado'?'↩':'✓'}</button>
          <button onclick="borrarSum(${propId},${s.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;">✕</button>
        </div>
      </div>
    `).join('')}
    <hr class="divider"/>
    <div style="font-size:0.85rem;font-weight:700;margin-bottom:0.7rem;">Añadir suministro</div>
    <div class="field"><label>Tipo</label><select id="s-tipo"><option>Luz</option><option>Agua</option><option>Gas</option><option>Internet</option><option>Basuras</option><option>Otro</option></select></div>
    <div class="field-row">
      <div class="field"><label>Periodo (ej: 2025-05)</label><input id="s-per" placeholder="2025-05"/></div>
      <div class="field"><label>Importe (€)</label><input id="s-imp" type="number"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Pagador</label><select id="s-pag"><option>Propietario</option><option>Inquilino</option></select></div>
      <div class="field"><label>Estado</label><select id="s-est"><option>Pendiente</option><option>Pagado</option></select></div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:0.5rem;">
      <input id="s-rec" type="checkbox" style="width:auto;margin:0;" checked/>
      <label for="s-rec" style="margin:0;font-size:0.85rem;">Recurrente (se resetea cada mes)</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="guardarSum(${propId})">Añadir</button>
    </div>
  `);
}
function toggleSumEstado(propId,sId){
  const p=propiedades.find(x=>x.id===propId),s=(p.suministros||[]).find(x=>x.id===sId);
  if(s){s.estado=s.estado==='Pagado'?'Pendiente':'Pagado';s.fechaPago=s.estado==='Pagado'?new Date().toISOString().slice(0,10):null;}
  verSuministrosProp(propId);saveData();
}
function guardarSum(propId){
  const p=propiedades.find(x=>x.id===propId),imp=parseFloat(document.getElementById('s-imp').value)||0;
  if(!imp){alert('Importe obligatorio');return;}
  p.suministros=p.suministros||[];
  p.suministros.push({id:nextId++,tipo:document.getElementById('s-tipo').value,periodo:document.getElementById('s-per').value,importe:imp,pagador:document.getElementById('s-pag').value,estado:document.getElementById('s-est').value,recurrente:document.getElementById('s-rec').checked});
  verSuministrosProp(propId);saveData();
}
function borrarSum(propId,sId){const p=propiedades.find(x=>x.id===propId);p.suministros=p.suministros.filter(s=>s.id!==sId);verSuministrosProp(propId);saveData();}

function renderSuministrosGlobal(c){
  const todos=[];propiedades.forEach(p=>(p.suministros||[]).forEach(s=>todos.push({...s,pNombre:p.nombre,propId:p.id})));
  if(!todos.length){c.innerHTML=`<div class="empty"><div class="empty-icon">💡</div><p>Sin suministros registrados</p></div>`;return;}
  const tP=todos.filter(s=>s.pagador==='Propietario').reduce((a,s)=>a+s.importe,0),pend=todos.filter(s=>s.estado==='Pendiente').length;
  c.innerHTML=`
    <div class="stats2">
      <div class="stat-box"><div class="stat-label">Total propietario</div><div class="stat-val red">${fmt(tP)}€</div></div>
      <div class="stat-box"><div class="stat-label">Pendientes</div><div class="stat-val ${pend>0?'red':''}">${pend}</div></div>
    </div>
    <div class="card">
      ${todos.map(s=>`
        <div class="list-item">
          <div><div class="li-title">${s.tipo} — ${s.pNombre}</div><div class="li-sub">${s.periodo||''} · ${s.pagador}${s.fechaPago?' · pagado el '+s.fechaPago.slice(8,10):''}</div></div>
          <div style="display:flex;align-items:center;gap:0.4rem;">
            <span class="badge badge-${s.estado==='Pagado'?'green':'orange'}">${s.estado}</span>
            <span style="font-weight:700;">${fmt(s.importe)}€</span>
            <button onclick="toggleSumGlobal(${s.propId},${s.id})" style="background:none;border:none;cursor:pointer;font-size:1rem;">${s.estado==='Pagado'?'↩':'✓'}</button>
          </div>
        </div>
      `).join('')}
    </div>`;
}
function toggleSumGlobal(propId,sId){
  const p=propiedades.find(x=>x.id===propId),s=(p.suministros||[]).find(x=>x.id===sId);
  if(s){s.estado=s.estado==='Pagado'?'Pendiente':'Pagado';s.fechaPago=s.estado==='Pagado'?new Date().toISOString().slice(0,10):null;}
  renderSection(currentSection);saveData();
}

// ── INQUILINOS ────────────────────────────────────────
function renderInquilinos(c){
  const inqs=[];
  propiedades.forEach(p=>{
    if(p.tipo==='habitaciones')p.habitaciones.filter(h=>h.inquilino).forEach(h=>inqs.push({nombre:h.inquilino,tel:h.telefono,email:h.email,alquiler:h.alquiler,prop:p.nombre,hab:'Hab. '+h.num,entrada:h.entrada,fin:h.finContrato,cobrado:h.cobrado}));
    else(p.ingresos||[]).filter(ig=>ig.inquilino).forEach(ig=>inqs.push({nombre:ig.inquilino,tel:'',email:'',alquiler:ig.importe,prop:p.nombre,hab:'Piso completo',entrada:ig.entrada||'',fin:ig.finContrato||'',cobrado:ig.cobrado}));
  });
  if(!inqs.length){c.innerHTML=`<div class="empty"><div class="empty-icon">👥</div><p>Sin inquilinos registrados.<br>Añádelos desde cada propiedad.</p></div>`;return;}
  c.innerHTML=inqs.map(i=>`
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${i.nombre}</div><div class="card-subtitle">${i.prop} · ${i.hab}</div></div>
        <div style="display:flex;flex-direction:column;gap:0.25rem;align-items:flex-end;">
          <span class="badge badge-green">${fmt(i.alquiler)}€/mes</span>
          <span class="badge badge-${i.cobrado?'green':'orange'}">${i.cobrado?'✓ Cobrado':'⏳ Pendiente'}</span>
        </div>
      </div>
      ${i.tel?`<div class="dr"><span class="lbl">📞</span><span class="val">${i.tel}</span></div>`:''}
      ${i.email?`<div class="dr"><span class="lbl">✉️</span><span class="val">${i.email}</span></div>`:''}
      ${i.entrada?`<div class="dr"><span class="lbl">📅 Entrada</span><span class="val">${i.entrada}</span></div>`:''}
      ${i.fin?`<div class="dr"><span class="lbl">🏁 Fin contrato</span><span class="val">${i.fin}</span></div>`:''}
    </div>
  `).join('');
}

// ── IPC MODAL ─────────────────────────────────────────
function abrirModalIPC(propId,habId,igId,alquilerActual){
  showModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">📈 Aplicar subida IPC</div>
    <div style="background:#fff7ed;border-radius:8px;padding:0.7rem;margin-bottom:1rem;font-size:0.82rem;color:#9a3412;">Introduce el % de subida (p.ej. 2.5 para un 2,5%).</div>
    <div class="field"><label>Alquiler actual (€)</label><input id="ipc-actual" type="number" value="${alquilerActual}" readonly style="background:#f3f4f6;"/></div>
    <div class="field"><label>% IPC a aplicar</label><input id="ipc-pct" type="number" step="0.1" placeholder="Ej: 2.5" oninput="calcNuevoAlquiler()"/></div>
    <div class="field"><label>Nuevo alquiler (€)</label><input id="ipc-nuevo" type="number" placeholder="Se calcula automáticamente"/></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="aplicarIPC(${propId},${habId||'null'},${igId||'null'})">Aplicar subida</button>
    </div>
  `);
}
function calcNuevoAlquiler(){
  const actual=parseFloat(document.getElementById('ipc-actual').value)||0;
  const pct=parseFloat(document.getElementById('ipc-pct').value)||0;
  document.getElementById('ipc-nuevo').value=(actual*(1+pct/100)).toFixed(2);
}
function aplicarIPC(propId,habId,igId){
  const nuevo=parseFloat(document.getElementById('ipc-nuevo').value)||0;
  if(!nuevo){alert('Introduce el % IPC');return;}
  const p=propiedades.find(x=>x.id===propId);
  if(habId){const h=p.habitaciones.find(x=>x.id===habId);if(h)h.alquiler=Math.round(nuevo);}
  else if(igId){const ig=(p.ingresos||[]).find(x=>x.id===igId);if(ig)ig.importe=Math.round(nuevo);}
  closeModal();renderSection(currentSection);saveData();
}

// ── MODAL ─────────────────────────────────────────────
function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('show');}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.remove('show');renderSection(currentSection);}
document.getElementById('modal-overlay').addEventListener('click',closeModal);
</script>
</body>
</html>
